<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krishnan Govindan</title>
    <script>
      // SPA redirect: store the path in sessionStorage and redirect to index.html
      var path = window.location.pathname;
      sessionStorage.setItem("redirectPath", path);
      window.location.replace("/");
    </script>
  </head>
  <body></body>
</html>
